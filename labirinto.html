<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Labirinto</title>

<link rel="manifest"
href="manifest.json">

<style>
body {
  margin: 0;
  background: black;
  text-align: center;
  color: white;
  font-family: Arial;
}

#hud {
  font-size: 28px;
  padding: 10px;
}

canvas {
  background: #111;
  display: block;
  margin: auto;
}

#controles {
  margin-top: 10px;
}

#controles button {
  width: 70px;
  height: 70px;
  font-size: 25px;
  margin: 5px;
  border-radius: 15px;
  border: none;
}

#gameOverTela {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#gameOverTela button {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
}
#controleWrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  margin-top: 10px;
}

#setas button {
  font-size: 28px;
  width: 70px;
  height: 70px;
  border-radius: 15px;
}

#poderes {
  display: flex;
  align-items: center;
}

#btnCongelar {
  position: relative;
  font-size: 20px;
  width: 70px;
  height: 70px;
  border-radius: 15px;
}

#cooldownTexto {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: red;
}
#menu {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#menu h1 {
  color: white;
  font-size: 40px;
  margin-bottom: 30px;
}

#menu button {
  font-size: 25px;
  padding: 15px 40px;
  border-radius: 15px;
  cursor: pointer;
}
</style>
</head>

<body>
<div id="menu">
  <h1>Labirinto Científico</h1>
  <button onclick="iniciarJogo()">Jogar</button>
</div>
<div id="hud">Pontos: 0</div>
<canvas id="game" width="400" height="400"></canvas>

<div id="controleWrapper">
  
  <div id="setas">
    <button onclick="moverPlayer(0,-1)">↑</button>
    <div>
      <button onclick="moverPlayer(-1,0)">←</button>
      <button onclick="moverPlayer(0,1)">↓</button>
      <button onclick="moverPlayer(1,0)">→</button>
    </div>
  </div>

  <div id="poderes">
    <button id="btnCongelar" onclick="congelarInimigos()">
      🧊
      <span id="cooldownTexto"></span>
    </button>
  </div>

</div>

<!-- GAME OVER -->
<div id="gameOverTela">
  <h1>GAME OVER</h1>
  <button onclick="resetarJogo()">Resetar</button>
</div>

<script>
  let jogoIniciado = false

function iniciarJogo() {
  document.getElementById("menu").style.display = "none"
  jogoIniciado = true
}
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let escala;
const hud = document.getElementById("hud");

let somColetar = new Audio("Boom.wav");

document.addEventListener("click", () => {
  somColetar.play().then(() => {
    somColetar.pause();
    somColetar.currentTime = 0;
  }).catch(() => {});
}, { once: true });

let fase = 1;
let pontos = 0;
let nivel = 1;
let jogoAcabou = false;
let congelado = false;
let cooldownAtivo = false;

let mapa = [];
let inimigos = [];
let apple = {};

const player = {
  gridX: 1,
  gridY: 1,
  x: 0,
  y: 0,
  targetX: 0,
  targetY: 0,
  speed: 4
};
const imgBaixo = new Image();
imgBaixo.src = "baixo.png";

const imgCima = new Image();
imgCima.src = "cima.png";

const imgDireita = new Image();
imgDireita.src = "direita.png";

const imgEsquerda = new Image();
imgEsquerda.src = "esquerda.png";

const mImgBaixo = new Image();
mImgBaixo.src = "mbaixo.png";

const mImgCima = new Image();
mImgCima.src = "mcima.png";

const mImgDireita = new Image();
mImgDireita.src = "mdireita.png";

const mImgEsquerda = new Image();
mImgEsquerda.src = "mesquerda.png";

const imgParede = new Image();
imgParede.src = "parede.png";

const imgChao = new Image();
imgChao.src = "chao.png";

const imgMaca = new Image();
imgMaca.src = "maca.png";

let playerImg = imgBaixo;

function criarMapa(tamanho) {
  mapa = [];
  for (let y = 0; y < tamanho; y++) {
    let linha = [];
    for (let x = 0; x < tamanho; x++) {
      if (
        y === 0 ||
        x === 0 ||
        y === tamanho - 1 ||
        x === tamanho - 1 ||
        Math.random() < 0.15
      ) {
        linha.push(1);
      } else {
        linha.push(0);
      }
    }
    mapa.push(linha);
  }
  // garante que o player sempre nasce em lugar vazio
mapa[1][1] = 0;
}

function spawnApple() {
  let tamanho = mapa.length;
  while (true) {
    let x = Math.floor(Math.random() * tamanho);
    let y = Math.floor(Math.random() * tamanho);
    if (mapa[y][x] === 0) {
      apple.x = x;
      apple.y = y;
      break;
    }
  }
}

function criarInimigos(qtd) {
  inimigos = [];
  let tamanho = mapa.length;

  for (let i = 0; i < qtd; i++) {

    while (true) {
      let x = Math.floor(Math.random() * tamanho);
      let y = Math.floor(Math.random() * tamanho);

      if (mapa[y][x] === 0) {
        inimigos.push({
          gridX: x,
          gridY: y,
          x: x * escala,
          y: y * escala,
          targetX: x * escala,
          targetY: y * escala,
          speed: 1,
          img: mImgBaixo
        });
        break;
      }
    }

  }
}
function mudarFase2() {
  fase = 2;
  nivel = 1;

  criarMapa(20);
  escala = canvas.width / mapa.length;

  player.gridX = 1;
  player.gridY = 1;
  player.x = 1 * escala;
  player.y = 1 * escala;
  player.targetX = player.x;
  player.targetY = player.y;

  criarInimigos(1);
  spawnApple();
}

function proximoNivel() {
  nivel++;
  criarMapa(20);
  player.gridX = 1;
player.gridY = 1;
player.x = 1 * escala;
player.y = 1 * escala;
player.targetX = player.x;
player.targetY = player.y;
  criarInimigos(nivel);
  spawnApple();
}

function desenhar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let tamanho = mapa.length;
  escala = canvas.width / tamanho;

  // MAPA
  for (let y = 0; y < tamanho; y++) {
    for (let x = 0; x < tamanho; x++) {

      if (mapa[y][x] === 1) {
        ctx.drawImage(imgParede, x * escala, y * escala, escala, escala);
      } else {
        ctx.drawImage(imgChao, x * escala, y * escala, escala, escala);
      }

    }
  }

  // MAÇÃ
  ctx.drawImage(imgMaca, apple.x * escala, apple.y * escala, escala, escala);

  // PLAYER
  ctx.drawImage(playerImg, player.x, player.y, escala, escala);

  // INIMIGOS
  inimigos.forEach(inimigo => {
    ctx.drawImage(inimigo.img, inimigo.x, inimigo.y, escala, escala);
  });
}

function moverPlayer(dx, dy) {
  if (jogoAcabou) return;
 
  if (dx === 1) playerImg = imgDireita;
  if (dx === -1) playerImg = imgEsquerda;
  if (dy === 1) playerImg = imgBaixo;
  if (dy === -1) playerImg = imgCima;

  let nx = player.gridX + dx;
let ny = player.gridY + dy;

if (mapa[ny] && mapa[ny][nx] === 0) {
  player.gridX = nx;
  player.gridY = ny;

  player.targetX = nx * escala;
  player.targetY = ny * escala;
}

  if (player.gridX === apple.x && player.gridY === apple.y) {
    pontos++;
    somColetar.currentTime = 0;
    somColetar.play();
    hud.innerText = "Pontos: " + pontos;

    if (fase === 1 && pontos >= 10) {
      mudarFase2();
    } else if (fase === 2 && pontos % 10 === 0) {
      proximoNivel();
    }

    spawnApple();
  }
}



function moverInimigos() {
  if (jogoAcabou) return;
  if (congelado) return;

  inimigos.forEach(inimigo => {

    // se chegou no destino, escolhe novo bloco
    if (Math.abs(inimigo.x - inimigo.targetX) < inimigo.speed &&
    Math.abs(inimigo.y - inimigo.targetY) < inimigo.speed) {
      
      inimigo.x = inimigo.targetX;
inimigo.y = inimigo.targetY;

      let dx = player.gridX - inimigo.gridX;
      let dy = player.gridY - inimigo.gridY;

      let direcoes = [
  { x: 1, y: 0 },
  { x: -1, y: 0 },
  { x: 0, y: 1 },
  { x: 0, y: -1 }
];

// filtra só as que não são parede
let possiveis = direcoes.filter(dir => {
  let nx = inimigo.gridX + dir.x;
  let ny = inimigo.gridY + dir.y;
  return mapa[ny] && mapa[ny][nx] === 0;
});

// ordena por proximidade do player
possiveis.sort((a, b) => {
  let da = Math.abs((inimigo.gridX + a.x) - player.gridX) +
           Math.abs((inimigo.gridY + a.y) - player.gridY);

  let db = Math.abs((inimigo.gridX + b.x) - player.gridX) +
           Math.abs((inimigo.gridY + b.y) - player.gridY);

  return da - db;
});

// escolhe uma das 2 melhores aleatoriamente
let escolhida = possiveis[Math.floor(Math.random() * Math.min(2, possiveis.length))];

if (escolhida) {

  if (escolhida.x === 1) inimigo.img = mImgDireita;
  if (escolhida.x === -1) inimigo.img = mImgEsquerda;
  if (escolhida.y === 1) inimigo.img = mImgBaixo;
  if (escolhida.y === -1) inimigo.img = mImgCima;

  inimigo.gridX += escolhida.x;
  inimigo.gridY += escolhida.y;
  inimigo.targetX = inimigo.gridX * escala;
  inimigo.targetY = inimigo.gridY * escala;
}
    }

    // DESLIZAR
    if (inimigo.x < inimigo.targetX) inimigo.x += inimigo.speed;
    if (inimigo.x > inimigo.targetX) inimigo.x -= inimigo.speed;
    if (inimigo.y < inimigo.targetY) inimigo.y += inimigo.speed;
    if (inimigo.y > inimigo.targetY) inimigo.y -= inimigo.speed;

    // colisão
    if (inimigo.gridX === player.gridX &&
        inimigo.gridY === player.gridY) {
      jogoAcabou = true;
      document.getElementById("gameOverTela").style.display = "flex";
    }
  });
}

function resetarJogo() {
  pontos = 0;
  fase = 1;
  nivel = 1;
  jogoAcabou = false;

  hud.innerText = "Pontos: 0";

  document.getElementById("gameOverTela").style.display = "none";

  criarMapa(10);
  player.gridX = 1;
player.gridY = 1;
player.x = player.gridX * escala;
player.y = player.gridY * escala;
player.targetX = player.x;
player.targetY = player.y;
  inimigos = [];
  spawnApple();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") moverPlayer(0, -1);
  if (e.key === "ArrowDown") moverPlayer(0, 1);
  if (e.key === "ArrowLeft") moverPlayer(-1, 0);
  if (e.key === "ArrowRight") moverPlayer(1, 0);
});

function loop() {

  if (jogoIniciado) {
    moverInimigos();

    if (player.x < player.targetX) player.x += player.speed;
    if (player.x > player.targetX) player.x -= player.speed;
    if (player.y < player.targetY) player.y += player.speed;
    if (player.y > player.targetY) player.y -= player.speed;
  }

  desenhar();
  requestAnimationFrame(loop);
}

function congelarInimigos() {
  if (congelado || cooldownAtivo) return;

  const botao = document.getElementById("btnCongelar");

  congelado = true;
  cooldownAtivo = true;

  botao.disabled = true;

  setTimeout(() => {
    congelado = false;
  }, 5000);

  setTimeout(() => {
    cooldownAtivo = false;
    botao.disabled = false;
  }, 20000);
}

window.onload = function() {

  criarMapa(10);
  escala = canvas.width / mapa.length;

  player.x = player.gridX * escala;
  player.y = player.gridY * escala;
  player.targetX = player.x;
  player.targetY = player.y;


  spawnApple();
  loop();

};
</script>

</body>
</html>.
